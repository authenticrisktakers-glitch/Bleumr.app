name: Build & Release

on:
  push:
    tags:
      - 'v*'         # Push a tag like v1.2.0 to trigger
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

permissions:
  contents: write     # Needed to create GitHub Releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            args: --mac --arm64 --x64
          - os: windows-latest
            platform: win
            args: --win
          - os: ubuntu-latest
            platform: linux
            args: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_DEEPGRAM_API_KEY: ${{ secrets.VITE_DEEPGRAM_API_KEY }}
        run: npx electron-vite build

      - name: Package installer
        env:
          # Skip code signing for beta — users bypass Gatekeeper manually
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # GitHub token for uploading release assets
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.args }} --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bleumr-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
          retention-days: 30
