<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bleumr</title>
    <meta name="description" content="AI-powered browser, chat agent, and web designer" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/Icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/Icon.png" />
  </head>
  <body style="background:#000;margin:0;padding:0;min-height:100vh;min-height:100dvh;">
    <script>
      // ── PWA Auto-Update System (runs FIRST — before splash) ──
      // If version mismatch, reload immediately so splash never shows on stale page
      var APP_CACHE_VERSION = 'v1.10.0';
      var CACHE_VER_KEY = 'bleumr_app_ver';

      if ('serviceWorker' in navigator) {
        var storedVer = localStorage.getItem(CACHE_VER_KEY);
        if (storedVer !== APP_CACHE_VERSION) {
          console.log('[Bleumr] Version changed ' + storedVer + ' → ' + APP_CACHE_VERSION + ' — busting cache');
          localStorage.setItem(CACHE_VER_KEY, APP_CACHE_VERSION);
          caches.keys().then(function(names) {
            return Promise.all(names.map(function(n) { return caches.delete(n); }));
          }).then(function() {
            return navigator.serviceWorker.getRegistrations();
          }).then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          }).then(function() {
            window.location.reload();
          }).catch(function() {
            window.location.reload();
          });
          // Stop page render — we're about to reload
          document.write('<div style="position:fixed;inset:0;background:#000;z-index:99999"></div>');
        }
      }
    </script>

    <!-- ── Splash: logo 2s → app ── -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:#000;">
      <img src="/splash.jpg" alt="" style="width:100%;height:100%;object-fit:cover;" />
    </div>

    <div id="root" style="background:#0a0a0a;min-height:100vh;min-height:100dvh;"></div>
    <script type="module" src="/main.tsx"></script>

    <script>
      // ── Splash: logo 2s then gone ──
      var sp = document.getElementById('splash');
      if (sp) {
        setTimeout(function() {
          if (sp && sp.parentNode) sp.parentNode.removeChild(sp);
        }, 2000);
      }

      // ── Service worker registration — delayed until after splash (3.5s) ──
      // SW updates can trigger reloads, so wait until splash is done
      if ('serviceWorker' in navigator && localStorage.getItem(CACHE_VER_KEY) === APP_CACHE_VERSION) {
        setTimeout(function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            reg.update().catch(function() {});
            setInterval(function() { reg.update().catch(function() {}); }, 10000);

            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'activated') {
                  console.log('[Bleumr] New SW activated — reloading');
                  window.location.reload();
                }
              });
            });
          }).catch(function() {});

          navigator.serviceWorker.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SW_UPDATED') {
              console.log('[Bleumr] SW_UPDATED message — reloading');
              window.location.reload();
            }
          });
        }, 3500);
      }
    </script>
  </body>
</html>
