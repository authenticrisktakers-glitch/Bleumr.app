<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bleumr</title>
    <meta name="description" content="AI-powered browser, chat agent, and web designer" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/Icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/Icon.png" />
  </head>
  <body style="background:#020208;margin:0;padding:0;min-height:100vh;min-height:100dvh;">
    <div id="root" style="background:#020208;min-height:100vh;min-height:100dvh;"></div>
    <script type="module" src="/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Force check for updates immediately on every app open
            reg.update().catch(() => {});
            // Then check every 60 seconds
            setInterval(() => reg.update().catch(() => {}), 60000);
            // When a new SW is waiting, tell it to activate immediately
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'activated') {
                  // New version is live — reload the page
                  window.location.reload();
                }
              });
            });
          }).catch(() => {});
          // Listen for SW_UPDATED message from the service worker
          navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'SW_UPDATED') {
              window.location.reload();
            }
          });
        });
      }
    </script>
  </body>
</html>
