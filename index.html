<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bleumr</title>
    <meta name="description" content="AI-powered browser, chat agent, and web designer" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/Icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/Icon.png" />
  </head>
  <body style="background:#0a0a0a;margin:0;padding:0;min-height:100vh;min-height:100dvh;">
    <div id="root" style="background:#0a0a0a;min-height:100vh;min-height:100dvh;"></div>
    <script type="module" src="/main.tsx"></script>
    <script>
      // ── PWA Cache Nuclear Bust ──
      // Bump this version to force ALL clients to wipe caches and reload
      var APP_CACHE_VERSION = 'v1.3.2';
      var CACHE_VER_KEY = 'bleumr_app_ver';
      if ('serviceWorker' in navigator) {
        var storedVer = localStorage.getItem(CACHE_VER_KEY);
        if (storedVer !== APP_CACHE_VERSION) {
          // Version mismatch — nuke everything and reload clean
          localStorage.setItem(CACHE_VER_KEY, APP_CACHE_VERSION);
          caches.keys().then(function(names) {
            return Promise.all(names.map(function(n) { return caches.delete(n); }));
          }).then(function() {
            return navigator.serviceWorker.getRegistrations();
          }).then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          }).then(function() {
            window.location.reload();
          }).catch(function() {
            window.location.reload();
          });
        } else {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').then(function(reg) {
              reg.update().catch(function() {});
              setInterval(function() { reg.update().catch(function() {}); }, 60000);
              reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'activated') {
                    window.location.reload();
                  }
                });
              });
            }).catch(function() {});
            navigator.serviceWorker.addEventListener('message', function(event) {
              if (event.data && event.data.type === 'SW_UPDATED') {
                window.location.reload();
              }
            });
          });
        }
      }
    </script>
  </body>
</html>
