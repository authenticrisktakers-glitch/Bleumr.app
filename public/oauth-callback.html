<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bleumr — Connecting…</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: rgb(8, 8, 12);
      color: rgba(255, 255, 255, 0.85);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(147, 130, 220, 0.2);
      border-top-color: rgba(147, 130, 220, 0.9);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
    }
    p {
      font-size: 13px;
      margin: 0;
      color: rgba(255, 255, 255, 0.5);
      max-width: 320px;
      line-height: 1.5;
    }
    .error {
      color: rgba(239, 68, 68, 0.9);
    }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Connecting your account…</h1>
  <p id="msg">You can close this window if it doesn't close automatically.</p>

  <script>
    (function () {
      // Pull code/state/error from either ?query or #fragment
      function getParams() {
        var p = new URLSearchParams(window.location.search);
        if (!p.get('code') && window.location.hash.length > 1) {
          p = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        }
        return p;
      }

      var p = getParams();
      var code = p.get('code');
      var state = p.get('state');
      var error = p.get('error') || p.get('error_description');

      var title = document.getElementById('title');
      var msg = document.getElementById('msg');
      var spinner = document.getElementById('spinner');

      function showError(text) {
        spinner.style.display = 'none';
        title.textContent = 'Connection failed';
        title.className = 'error';
        msg.textContent = text || 'Something went wrong. Please try again.';
      }

      function showSuccess() {
        title.textContent = 'Connected!';
        msg.textContent = 'You can close this window.';
      }

      // Path A: opened as a popup → postMessage to opener
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage(
            {
              type: 'bleumr_oauth_callback',
              code: code,
              state: state,
              error: error,
            },
            window.location.origin
          );
          if (error) {
            showError(error);
          } else {
            showSuccess();
            setTimeout(function () { window.close(); }, 600);
          }
          return;
        } catch (e) {
          // fall through to redirect path
        }
      }

      // Path B: opened via full-page redirect (mobile/standalone PWA)
      // → bounce back to the app with hash fragment so the app's mount handler
      //   can call handleRedirectCallback() to finish the flow.
      if (error) {
        showError(error);
        setTimeout(function () { window.location.replace('/'); }, 1500);
        return;
      }
      if (code && state) {
        var hash = '#code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
        window.location.replace('/' + hash);
        return;
      }

      showError('No authorization code received.');
    })();
  </script>
</body>
</html>
